###############################################
# MoveIt Servo config for Gen3 7DOF
###############################################
use_gazebo: false

## Properties of incoming commands
command_in_type: "speed_units"  # speed_units: cmds are in m/s and rad/s
scale:
  linear: 0.5
  rotational: 1.0
  joint: 1.0

## Properties of outgoing commands
# MoveIt Servo is used for collision monitoring only.
# Actual twist commands go through twist_controller via the bridge node.
publish_period: 0.01  # 1/Hz. Override via launch arg 'servo_hz'
low_latency_mode: false

# Output type (kept for Servo node compatibility, not primary command path)
command_out_type: trajectory_msgs/JointTrajectory

# What to publish
publish_joint_positions: true
publish_joint_velocities: false
publish_joint_accelerations: false

## Incoming Joint State properties
low_pass_filter_coeff: 2.0

## MoveIt properties
move_group_name: manipulator
planning_frame: base_link

## Other frames
ee_frame_name: end_effector_link
robot_link_command_frame: base_link

## Stopping behaviour
incoming_command_timeout: 0.2
num_outgoing_halt_msgs_to_publish: 4

## Singularity and joint limits
lower_singularity_threshold: 17.0
hard_stop_singularity_threshold: 30.0
joint_limit_margin: 0.1

## Topic names
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: /joint_states
status_topic: ~/status
command_out_topic: /joint_trajectory_controller/joint_trajectory

## Collision checking
check_collisions: true
collision_check_rate: 10.0
collision_check_type: threshold_distance
self_collision_proximity_threshold: 0.01
scene_collision_proximity_threshold: 0.02
collision_distance_safety_factor: 1000.0
min_allowable_collision_distance: 0.01
